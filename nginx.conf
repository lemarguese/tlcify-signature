server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  types {
    application/javascript js mjs;
    text/html             html;
    text/css              css;
    image/x-icon          ico;
    image/png             png;
    image/jpeg            jpg jpeg;
    image/svg+xml         svg;
    application/json      json;
    font/woff2            woff2;
  }

  location / { try_files $uri /index.html; }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
